{% extends "base.html" %}
{% block title %}登入 — 食在好料{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto">
  <div class="page-header text-center">
    <h1>🔑 登入</h1>
    <p>登入以使用收藏、評論等功能</p>
  </div>
  <div style="background:var(--card);padding:2rem;border-radius:var(--radius);border:1px solid var(--border)">
    <form method="POST">
      <div class="form-group">
        <label>使用者名稱</label>
        <input type="text" name="username" class="form-control" required placeholder="輸入帳號">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" name="password" class="form-control" required placeholder="輸入密碼">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">
        <i class="fas fa-sign-in-alt"></i> 登入
      </button>
    </form>
    <p class="text-center mt-2" style="font-size:0.9rem">
      還沒有帳號？<a href="{{ url_for('register') }}" style="color:var(--accent)">立即註冊</a>
    </p>
    <p class="text-center text-muted" style="font-size:0.8rem;margin-top:0.5rem">
      測試帳號：demo / demo123
    </p>
  </div>
</div>
{% endblock %}
